[providers]
    # Nixpacks automatically detects PHP and Node based on composer.json and package.json

[variables]
    # Tells Nginx to serve the app from the public directory (required for Laravel)
    NIXPACKS_PHP_ROOT_DIR = "/app/public"

[phases.build]
    # Commands executed during the container build phase
    cmds = [
        "composer install --no-dev --optimize-autoloader --no-interaction",
        "npm install",
        "npm run build"
    ]

[phases.run]
    # Ensure our start script is executable
    cmds = [ "chmod +x /app/start.sh" ]

[staticAssets]
    "start.sh" = '''
#!/bin/bash
set -e

echo "Caching Laravel config and routes..."
php artisan config:cache
php artisan route:cache

echo "Running migrations..."
php artisan migrate --force

echo "Starting Reverb WebSocket Server..."
# We start Reverb on 8080. Nginx handles the SSL and proxies to this.
php artisan reverb:start --host="0.0.0.0" --port="8080" &

echo "Starting PHP-FPM and Nginx Server..."
php-fpm -y /assets/php-fpm.conf & nginx -c /app/nginx.conf
'''

[start]
    cmd = "bash /app/start.sh"

