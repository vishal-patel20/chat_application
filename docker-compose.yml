version: '3.8'

services:
  # Database Service
  db:
    image: mysql:8.0
    container_name: chat-db
    restart: unless-stopped
    tty: true
    ports:
      - "3306:3306"
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-laravel}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-root}
      MYSQL_PASSWORD: ${DB_PASSWORD:-root}
      MYSQL_USER: ${DB_USERNAME:-root}
    volumes:
      - dbdata:/var/lib/mysql

  # PHP Application Service
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: chat-app
    restart: unless-stopped
    tty: true
    environment:
      SERVICE_NAME: app
      SERVICE_TAGS: dev
    volumes:
      - .:/var/www/html
      - ./docker/entrypoint.sh:/usr/local/bin/entrypoint.sh
    depends_on:
      - db
    networks:
      - chat-network

  # Nginx Web Server
  web:
    image: nginx:alpine
    container_name: chat-web
    restart: unless-stopped
    tty: true
    ports:
      - "8000:80"
    volumes:
      - .:/var/www/html
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - chat-network

  # Laravel Reverb (WebSocket)
  reverb:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: chat-reverb
    restart: unless-stopped
    command: ["php", "artisan", "reverb:start", "--host=0.0.0.0", "--port=8080"]
    volumes:
      - .:/var/www/html
    depends_on:
      - app
    networks:
      - chat-network

networks:
  chat-network:
    driver: bridge

volumes:
  dbdata:
    driver: local
